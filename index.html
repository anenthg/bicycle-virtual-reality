<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endless Rider 🚲</title>
    <style>
      :root {
        --font-fun: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN",
          Quicksand, "Comic Sans MS", "Trebuchet MS", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1030;
        font-family: var(--font-fun);
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }
      #app { position: fixed; inset: 0; }
      #game-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      #overlay-2d {
        position: absolute; inset: 0; width: 100%; height: 100%;
        pointer-events: none;
      }
      /* Subtle vignette lifts perceived contrast for free */
      #vignette {
        position: absolute; inset: 0; pointer-events: none; z-index: 5;
        background: radial-gradient(ellipse at center,
          rgba(0,0,0,0) 58%, rgba(20,10,40,0.18) 88%, rgba(20,10,40,0.34) 100%);
      }
      button { font-family: var(--font-fun); }
      /* Hidden video element that feeds the tracking pipeline */
      #cam-video {
        position: absolute;
        width: 1px; height: 1px;
        opacity: 0;
        pointer-events: none;
      }
      @keyframes er-pop {
        0% { transform: scale(0.6); opacity: 0; }
        70% { transform: scale(1.06); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes er-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="vignette"></div>
      <canvas id="overlay-2d"></canvas>
      <video id="cam-video" autoplay playsinline muted></video>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
